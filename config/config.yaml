defaults:
  - data: redwine
  - pred_model: mlp_small
  - projector: Sigma
  - _self_

device: [0] # relevant devices are given by list (-1 is cpu) # this might not work on cluster
device_torch: "cuda:0"
seed: 1
dtype: "float64"

plot:
  fontsize: 
    axes: 22
    legend: 18
  linewidth: 2.5
  show_legend: False
  evaluation:
    # if null (None) all methods from the dataframe are plotted
    methods: null
    legend: # display information in legend
      reduction_type: True
      psi: False

results_file:
  name_postfix: "" # postfix appended to SigmaP- and metrics files

metric:
  kl: True
  w2: False

hydra:
  job:
    chdir: False  